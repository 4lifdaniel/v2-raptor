services:
  frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://backend:3001
    restart: unless-stopped
    expose:
      - "3000"

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - ./backend/prisma:/app/prisma

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend