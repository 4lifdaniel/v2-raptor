http:
  routers:
    frontend-http:
      rule: "Host(`app-sec-portal.alifdaniel.com`)"
      service: frontend
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    frontend:
      rule: "Host(`app-sec-portal.alifdaniel.com`)"
      service: frontend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    backend-http:
      rule: "Host(`app-sec-portal.alifdaniel.com`) && PathPrefix(`/api/`)"
      service: backend
      entryPoints:
        - web

    backend:
      rule: "Host(`app-sec-portal.alifdaniel.com`) && PathPrefix(`/api/`)"
      service: backend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:3001"