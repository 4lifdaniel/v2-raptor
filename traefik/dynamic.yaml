http:
  routers:
    frontend:
      rule: "Host(`your-domain.com`)"
      service: frontend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    backend:
      rule: "Host(`your-domain.com`) && PathPrefix(`/api/`)"
      service: backend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:3001"